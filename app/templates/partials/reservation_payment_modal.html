<div class="modal fade" id="reservationPaymentModal" tabindex="-1" style="z-index: 1060;" data-default-origin="{{ reservation_payment_origin|default('reservations') }}">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title">Receber Reserva</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="resPaymentLoading" class="text-center py-3">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Carregando...</span>
                    </div>
                </div>
                <div id="resPaymentContent" style="display:none;">
                    <div class="alert alert-success py-2 mb-3">
                        <i class="bi bi-wallet2"></i> Recebimento exclusivo pelo Caixa de Reservas.
                    </div>
                    <div class="alert alert-info mb-3">
                        <strong>Hóspede:</strong> <span id="resPayGuestName"></span><br>
                        <strong>Categoria/Quarto:</strong> <span id="resPayRoom"></span>
                    </div>
                    <div class="card bg-light mb-3">
                        <div class="card-body">
                            <div class="d-flex justify-content-between mb-2">
                                <span>Valor Total da Reserva:</span>
                                <span class="fw-bold" id="resPayTotal">R$ 0,00</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span>Já Pago:</span>
                                <span class="text-success fw-bold" id="resPayPaid">R$ 0,00</span>
                            </div>
                            <div class="d-flex justify-content-between border-top pt-2">
                                <span>Saldo Pendente:</span>
                                <span class="text-danger fw-bold fs-5" id="resPayRemaining">R$ 0,00</span>
                            </div>
                        </div>
                    </div>
                    <form id="reservationPaymentForm">
                        <input type="hidden" id="resPayId" name="reservation_id">
                        <input type="hidden" id="resPayOrigin" value="{{ reservation_payment_origin|default('reservations') }}">
                        <div class="mb-3">
                            <label class="form-label">Valor a Receber (R$)</label>
                            <input type="number" step="0.01" class="form-control form-control-lg" id="resPayAmount" name="amount" required>
                            <div class="form-text text-danger" id="resPayError" style="display:none;"></div>
                            <div class="form-text text-success" id="resPayChangePreview" style="display:none;"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Forma de Pagamento</label>
                            <select class="form-select" id="resPayMethod" name="payment_method" required>
                                <option value="">Selecione...</option>
                            </select>
                        </div>
                    </form>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success" id="btnConfirmResPayment" onclick="submitReservationPayment()">
                    <i class="bi bi-check-circle"></i> Confirmar Pagamento
                </button>
            </div>
        </div>
    </div>
</div>
<script>
if (!window.__reservationPaymentModalBound) {
    window.__reservationPaymentModalBound = true;
    window.getReservationPaymentDefaultOrigin = function() {
        var modal = document.getElementById('reservationPaymentModal');
        return (modal && modal.dataset && modal.dataset.defaultOrigin) ? modal.dataset.defaultOrigin : 'reservations';
    };
    window.normalizeReservationPaymentMethods = function(sourceList) {
        var tags = ['reservations', 'reservas', 'caixa_reservas', 'reservation', 'reserva'];
        return (sourceList || []).filter(function(m) {
            var raw = (m && m.available_in !== undefined) ? m.available_in : [];
            var availableIn = Array.isArray(raw) ? raw : String(raw || '').split(',');
            var normalized = availableIn.map(function(v) { return String(v || '').toLowerCase().trim(); });
            return tags.some(function(tag) { return normalized.includes(tag); });
        });
    };
    window.fetchReservationPaymentMethods = async function() {
        var cached = window.normalizeReservationPaymentMethods(Array.isArray(window.reservationPaymentMethods) ? window.reservationPaymentMethods : []);
        if (cached.length) {
            return cached;
        }
        var methodsResp = await fetch('/api/payment-methods');
        if (!methodsResp.ok) {
            throw new Error('Erro ao buscar formas de pagamento');
        }
        var payload = await methodsResp.json();
        var base = Array.isArray(payload) ? payload : (payload && Array.isArray(payload.methods) ? payload.methods : []);
        return window.normalizeReservationPaymentMethods(base);
    };
    window.updateReservationChangePreview = function() {
        var amountInput = document.getElementById('resPayAmount');
        var methodSelect = document.getElementById('resPayMethod');
        var preview = document.getElementById('resPayChangePreview');
        if (!amountInput || !methodSelect || !preview) return;
        var amount = parseFloat(amountInput.value || '0');
        var maxAmount = parseFloat(amountInput.max || '0');
        var option = methodSelect.options[methodSelect.selectedIndex];
        var methodName = String((option && option.dataset && option.dataset.name) || '').toLowerCase();
        var isCash = methodName.includes('dinheiro');
        if (!methodName || amount <= 0) {
            preview.style.display = 'none';
            return;
        }
        if (isCash && amount > maxAmount + 0.01) {
            var troco = amount - maxAmount;
            preview.textContent = 'Troco estimado: R$ ' + troco.toFixed(2) + ' (recebido acima do saldo em dinheiro).';
            preview.style.display = 'block';
            return;
        }
        if (Math.abs(amount - maxAmount) <= 0.01) {
            preview.textContent = 'Pagamento exato (sem troco).';
            preview.style.display = 'block';
            return;
        }
        if (amount < maxAmount - 0.01) {
            preview.textContent = 'Pagamento parcial do saldo pendente.';
            preview.style.display = 'block';
            return;
        }
        preview.style.display = 'none';
    };
    window.openReservationPaymentModal = async function(reservationId, guestName, roomInfo, originOverride) {
        var modalEl = document.getElementById('reservationPaymentModal');
        if (!modalEl) return;
        var modal = new bootstrap.Modal(modalEl);
        modal.show();
        var loading = document.getElementById('resPaymentLoading');
        var content = document.getElementById('resPaymentContent');
        var errorDiv = document.getElementById('resPayError');
        var preview = document.getElementById('resPayChangePreview');
        var confirmBtn = document.getElementById('btnConfirmResPayment');
        if (loading) loading.style.display = 'block';
        if (content) content.style.display = 'none';
        if (errorDiv) errorDiv.style.display = 'none';
        if (preview) preview.style.display = 'none';
        if (confirmBtn) confirmBtn.disabled = true;
        var originField = document.getElementById('resPayOrigin');
        if (originField) originField.value = originOverride || window.getReservationPaymentDefaultOrigin();
        document.getElementById('resPayGuestName').textContent = guestName || '';
        document.getElementById('resPayRoom').textContent = roomInfo || '-';
        document.getElementById('resPayId').value = reservationId || '';
        try {
            var debtResp = await fetch('/reception/reservation/' + encodeURIComponent(reservationId) + '/debt');
            if (!debtResp.ok) throw new Error('Erro ao buscar dados da reserva');
            var debtData = await debtResp.json();
            var total = Number(debtData.total || 0);
            var paid = Number(debtData.paid || 0);
            var remaining = Number(debtData.remaining || 0);
            document.getElementById('resPayTotal').textContent = 'R$ ' + total.toFixed(2);
            document.getElementById('resPayPaid').textContent = 'R$ ' + paid.toFixed(2);
            document.getElementById('resPayRemaining').textContent = 'R$ ' + remaining.toFixed(2);
            var amountInput = document.getElementById('resPayAmount');
            amountInput.value = remaining.toFixed(2);
            amountInput.max = String(remaining + 0.01);
            var select = document.getElementById('resPayMethod');
            select.innerHTML = '<option value="">Selecione...</option>';
            var methods = await window.fetchReservationPaymentMethods();
            if (!methods.length) throw new Error('Nenhuma forma de pagamento habilitada para Reservas em /payment-methods.');
            methods.forEach(function(m) {
                var option = document.createElement('option');
                option.value = m.id;
                option.textContent = m.name;
                option.dataset.name = m.name;
                select.appendChild(option);
            });
            window.updateReservationChangePreview();
            if (loading) loading.style.display = 'none';
            if (content) content.style.display = 'block';
            if (confirmBtn) confirmBtn.disabled = false;
        } catch (error) {
            alert(error.message);
        }
    };
    window.submitReservationPayment = async function() {
        var btn = document.getElementById('btnConfirmResPayment');
        var amountInput = document.getElementById('resPayAmount');
        var methodSelect = document.getElementById('resPayMethod');
        var errorDiv = document.getElementById('resPayError');
        var amount = parseFloat(amountInput.value);
        var maxAmount = parseFloat(amountInput.max);
        if (!amount || amount <= 0) {
            errorDiv.textContent = 'Digite um valor válido.';
            errorDiv.style.display = 'block';
            return;
        }
        if (!methodSelect.value) {
            alert('Selecione uma forma de pagamento.');
            return;
        }
        var option = methodSelect.options[methodSelect.selectedIndex];
        var methodName = String((option && option.dataset && option.dataset.name) || '').toLowerCase();
        var isCash = methodName.includes('dinheiro');
        if (!isCash && amount > maxAmount + 0.01) {
            errorDiv.textContent = 'O valor informado excede o saldo pendente de R$ ' + maxAmount.toFixed(2) + ' para esta forma de pagamento.';
            errorDiv.style.display = 'block';
            return;
        }
        errorDiv.style.display = 'none';
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processando...';
        try {
            var resp = await fetch('/reception/reservation/pay', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    reservation_id: document.getElementById('resPayId').value,
                    amount: amount,
                    payment_method_id: methodSelect.value,
                    payment_method_name: option.dataset.name,
                    origin: document.getElementById('resPayOrigin').value || window.getReservationPaymentDefaultOrigin()
                })
            });
            var result = await resp.json();
            if (!resp.ok) throw new Error(result.error || 'Erro ao processar pagamento');
            var troco = parseFloat(result.change_amount || 0);
            if (troco > 0) {
                alert('Pagamento registrado com sucesso!\nTroco: R$ ' + troco.toFixed(2));
            } else {
                alert('Pagamento registrado com sucesso!');
            }
            location.reload();
        } catch (error) {
            alert(error.message);
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-check-circle"></i> Confirmar Pagamento';
        }
    };
    document.addEventListener('DOMContentLoaded', function() {
        var amountInput = document.getElementById('resPayAmount');
        var methodSelect = document.getElementById('resPayMethod');
        if (amountInput) amountInput.addEventListener('input', window.updateReservationChangePreview);
        if (methodSelect) methodSelect.addEventListener('change', window.updateReservationChangePreview);
    });
}
</script>
