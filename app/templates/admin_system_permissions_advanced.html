{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Modo Avançado — Permissões</h2>
        <a href="{{ url_for('admin.admin_system_permissions') }}" class="btn btn-outline-secondary">Voltar</a>
    </div>
    <div class="alert alert-warning">
        Esta área contém recursos técnicos de diagnóstico e deve ser usada por perfis avançados.
    </div>
    <div class="row g-3">
        {% for tool in tools %}
        <div class="col-md-6 col-lg-3">
            <div class="card shadow-sm h-100">
                <div class="card-body d-flex flex-column">
                    <div class="mb-2 text-primary"><i class="bi {{ tool.icon }} fs-3"></i></div>
                    <h5 class="card-title">{{ tool.title }}</h5>
                    <p class="card-text text-muted small flex-grow-1">{{ tool.description }}</p>
                    <a href="{{ tool.url }}" class="btn btn-primary w-100">Abrir</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
